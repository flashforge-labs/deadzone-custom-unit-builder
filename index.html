<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deadzone Custom Unit Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Deadzone Custom Unit Builder</h1>
          <p>Unofficial custom profile points estimate.</p>
        </div>
        <output id="status" class="status">Loading model...</output>
      </header>

      <form id="unit-form" class="unit-card" aria-label="Custom unit builder">
        <section class="card-head">
          <label class="unit-name-field">
            <span>Unit</span>
            <input id="unitName" name="unitName" autocomplete="off" placeholder="Custom unit" />
          </label>
          <label>
            <span>Role</span>
            <select id="role" name="role"></select>
          </label>
          <label>
            <span>Qty</span>
            <input id="qty" type="number" min="1" max="20" step="1" value="1" />
          </label>
          <div class="points-box">
            <span>Pts</span>
            <output id="points">...</output>
          </div>
        </section>

        <section class="stat-strip" aria-label="Unit stats">
          <label>
            <span>SP</span>
            <div class="split-input">
              <input id="spAdvance" type="number" min="0" max="2" step="1" value="1" aria-label="SP advance" />
              <input id="spSprint" type="number" min="0" max="5" step="1" value="2" aria-label="SP sprint" />
            </div>
          </label>
          <label>
            <span>RA</span>
            <select id="ra"></select>
          </label>
          <label>
            <span>FI</span>
            <select id="fi"></select>
          </label>
          <label>
            <span>SV</span>
            <select id="sv"></select>
          </label>
          <label>
            <span>AR</span>
            <input id="ar" type="number" min="0" max="4" step="1" value="0" />
          </label>
          <label>
            <span>HP</span>
            <input id="hp" type="number" min="1" max="8" step="1" value="1" />
          </label>
          <label>
            <span>SZ</span>
            <input id="sz" type="number" min="1" max="4" step="1" value="1" />
          </label>
          <label>
            <span>Base</span>
            <select id="baseSize" name="baseSize"></select>
          </label>
        </section>

        <section class="keyword-line" aria-label="Model keywords">
          <span class="line-label">Model Keywords</span>
          <div id="modelKeywordPicker" class="keyword-picker"></div>
        </section>

        <section id="specialRulesSection" class="keyword-line" aria-label="Special rules" hidden>
          <span class="line-label">Special Rules</span>
          <div id="specialRulePicker" class="keyword-picker"></div>
        </section>

        <section class="rule-line" aria-label="Special rule text">
          <span class="line-label">Notes</span>
          <input id="notes" autocomplete="off" placeholder="Optional custom rule note" />
        </section>

        <section class="weapon-card" aria-label="Weapon stats">
          <div class="weapon-title-row">
            <div class="weapon-title">Weapon Stats</div>
            <button id="addWeapon" class="add-weapon-button" type="button">+ Add Weapon</button>
          </div>
          <div id="weaponsRoot" class="weapons-root" aria-live="polite"></div>
          <div class="weapon-footer">
            <div class="footer-box">
              <span>VP</span>
              <output id="vpOutput">...</output>
            </div>
            <label>
              <span>Manual +/-</span>
              <input id="manualAdjustment" type="number" min="-20" max="20" step="1" value="0" />
            </label>
          </div>
        </section>

        <section class="extras" aria-label="Builder actions">
          <button id="reset" type="button">Reset</button>
        </section>

        <details class="advanced">
          <summary>Advanced estimate details</summary>
          <dl>
            <dt>Continuous estimate</dt>
            <dd id="continuous">...</dd>
            <dt>Nearest integer</dt>
            <dd id="nearest">...</dd>
            <dt>Round-up probability</dt>
            <dd id="roundProbability">...</dd>
          </dl>
        </details>
      </form>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
